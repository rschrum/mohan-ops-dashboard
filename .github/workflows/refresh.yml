name: Refresh Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run dashboard refresh
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python refresh.py
      - name: Commit and push updated files
        run: |
          git config --global user.name  "Mohan Ops Bot"
          git config --global user.email "bot@mohanops.com"
          git add index.html dev-dashboard.html tasks.json
          git diff --staged --quiet || \
            git commit -m "chore: dashboard refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
